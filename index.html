<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cedar's Graphing Site</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <link rel="stylesheet" href="Outfit.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
  <who id="name" style="visibility: hidden;">cedar</who>
    <div id="controls">
        <h1 id="author"></h1>
        <div class="mode">
            <button onclick="toggleGraphMode('scatter')">Scatter Plot</button>
            <button onclick="toggleGraphMode('bar')">Bar Graph</button>
        </div>
    </div>
    <div id="graph-container">
        <div id="scatter-graph"></div>
        <div id="bar-graph" class="hidden"></div>
    </div>
    <div class="page">
        <button onclick="switchGraph(1)">Graph 1</button>
        <button onclick="switchGraph(2)">Graph 2</button>
    </div>

    <script src="src/Loader.js" type="module"></script>
    <script src="src/Render.js" type="module"></script>
    <script src="src/Interact.js" type="module"></script>
</body>
</html>
